[env:esp-wrover-kit]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =  bblanchon/ArduinoJson@^7.0.4
            knolleary/PubSubClient@^2.8
            smfsw/cQueue@^2.0
            arduino-libraries/NTPClient@^3.2.1

