;[env:lolin_s2_mini]
;platform = espressif32
;board = lolin_s2_mini
;framework = arduino

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = adafruit/DHT sensor library@^1.4.6
            adafruit/Adafruit Unified Sensor@^1.1.14

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps = adafruit/DHT sensor library@^1.4.6
            adafruit/Adafruit Unified Sensor@^1.1.14


[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
lib_deps = adafruit/DHT sensor library@^1.4.6
           adafruit/Adafruit Unified Sensor@^1.1.14